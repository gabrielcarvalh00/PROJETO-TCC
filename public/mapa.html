<!DOCTYPE html>
<html>
<head>
  <title>Mapa com Leaflet - Captura de Coordenadas</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body { font-family: 'Segoe UI', sans-serif; }

    .navbar {
      width: 100%;
      background: linear-gradient(135deg, #6a11cb, #2575fc);
      display: flex;
      align-items: center;
      padding: 15px 20px;
      position: relative;
      z-index: 1000;
    }

    .hamburger {
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .hamburger span {
      display: block;
      width: 28px;
      height: 3px;
      background: #fff;
      border-radius: 3px;
      transition: all 0.3s ease;
    }

    .navbar h2 {
      color: #fff;
      margin-left: 20px;
      font-size: 1.2rem;
      letter-spacing: 1px;
    }

    .sidebar {
      position: fixed;
      top: 0;
      left: -280px;
      width: 260px;
      height: 100%;
      background: linear-gradient(180deg, #6a11cb, #2575fc);
      z-index: 2000;
      transition: left 0.3s ease;
      padding: 30px 20px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .sidebar.open { left: 0; }

    .sidebar .close-btn {
      align-self: flex-end;
      background: none;
      border: none;
      color: #fff;
      font-size: 1.8rem;
      cursor: pointer;
      margin-bottom: 20px;
    }

    .sidebar a {
      color: #fff;
      text-decoration: none;
      font-size: 1.1rem;
      font-weight: 600;
      padding: 14px 18px;
      border-radius: 12px;
      transition: background 0.3s;
      display: block;
      cursor: pointer;
    }

    .sidebar a:hover { background: rgba(255,255,255,0.2); }
    .sidebar a.sair { color: #ff6b6b; }

    .overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.4);
      z-index: 1500;
    }

    .overlay.show { display: block; }

    #map { height: calc(100vh - 58px); }

    #painel-resultados {
      position: fixed;
      top: 58px;
      right: -350px;
      width: 320px;
      height: calc(100vh - 58px);
      background: rgba(255,255,255,0.97);
      box-shadow: -4px 0 20px rgba(0,0,0,0.2);
      z-index: 1000;
      transition: right 0.3s ease;
      overflow-y: auto;
      padding: 20px 15px;
    }

    #painel-resultados.open { right: 0; }

    #painel-minhas-imagens {
      position: fixed;
      top: 58px;
      left: -350px;
      width: 320px;
      height: calc(100vh - 58px);
      background: rgba(255,255,255,0.97);
      box-shadow: 4px 0 20px rgba(0,0,0,0.2);
      z-index: 1000;
      transition: left 0.3s ease;
      overflow-y: auto;
      padding: 20px 15px;
    }

    #painel-minhas-imagens.open { left: 0; }

    .painel-titulo {
      font-size: 1rem;
      color: #6a11cb;
      margin-bottom: 15px;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: bold;
    }

    .fechar-painel {
      position: absolute;
      top: 10px;
      right: 12px;
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: #999;
    }

    .card-imagem {
      background: #f4f4f4;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 12px;
      border-left: 4px solid #6a11cb;
    }

    .card-imagem p {
      font-size: 0.85rem;
      color: #333;
      margin-bottom: 5px;
    }

    .card-imagem a {
      display: block;
      margin-top: 8px;
      background: linear-gradient(135deg, #ff416c, #6a11cb);
      border-radius: 20px;
      color: #fff;
      font-weight: bold;
      padding: 8px 20px;
      font-size: 0.9rem;
      text-align: center;
      text-decoration: none;
    }

    .card-imagem button {
      margin-top: 8px;
      background: linear-gradient(135deg, #ff416c, #6a11cb);
      border: none;
      border-radius: 20px;
      color: #fff;
      font-weight: bold;
      padding: 8px 20px;
      cursor: pointer;
      font-size: 0.9rem;
      width: 100%;
    }

    .card-imagem button:hover, .card-imagem a:hover { opacity: 0.9; }
  </style>
</head>
<body>

  <div class="navbar">
    <div class="hamburger" id="hamburger">
      <span></span><span></span><span></span>
    </div>
    <h2>Mapa</h2>
  </div>

  <div class="overlay" id="overlay"></div>

  <div class="sidebar" id="sidebar">
    <button class="close-btn" id="closeBtn">&times;</button>
    <a id="btnMinhasImagens">Minhas Imagens</a>
    <a href="VenderImage.html">Vender Imagem</a>
    <a href="#" class="sair" id="btnSair">Sair</a>
  </div>

  <div id="map"></div>

  <div id="painel-resultados">
    <button class="fechar-painel" id="fecharPainel">&times;</button>
    <h3 class="painel-titulo">Resultados</h3>
    <div id="resultados"></div>
  </div>

  <div id="painel-minhas-imagens">
    <button class="fechar-painel" id="fecharMinhasImagens">&times;</button>
    <h3 class="painel-titulo">Minhas Imagens</h3>
    <div id="lista-minhas-imagens"></div>
  </div>

  <script>
    const hamburger = document.getElementById('hamburger');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');
    const closeBtn = document.getElementById('closeBtn');

    hamburger.addEventListener('click', () => {
      sidebar.classList.add('open');
      overlay.classList.add('show');
    });

    closeBtn.addEventListener('click', () => {
      sidebar.classList.remove('open');
      overlay.classList.remove('show');
    });

    overlay.addEventListener('click', () => {
      sidebar.classList.remove('open');
      overlay.classList.remove('show');
    });

    document.getElementById('fecharPainel').addEventListener('click', () => {
      document.getElementById('painel-resultados').classList.remove('open');
    });

    document.getElementById('fecharMinhasImagens').addEventListener('click', () => {
      document.getElementById('painel-minhas-imagens').classList.remove('open');
    });

    document.getElementById('btnSair').addEventListener('click', () => {
      localStorage.clear();
      window.location.href = 'login.html';
    });

    document.getElementById('btnMinhasImagens').addEventListener('click', () => {
      sidebar.classList.remove('open');
      overlay.classList.remove('show');

      const usuario_id = localStorage.getItem('usuario_id');
      const painel = document.getElementById('painel-minhas-imagens');
      const lista = document.getElementById('lista-minhas-imagens');

      lista.innerHTML = '<p style="color:#999;font-size:0.9rem">Carregando...</p>';
      painel.classList.add('open');

      fetch(`/minhas-imagens?usuario_id=${usuario_id}`)
        .then(res => res.json())
        .then(data => {
          lista.innerHTML = '';
          if (data.length === 0) {
            lista.innerHTML = '<p style="color:#999;font-size:0.9rem">Nenhuma imagem comprada ainda.</p>';
          } else {
            data.forEach(img => {
              lista.innerHTML += `
                <div class="card-imagem">
                  <p><strong>ID:</strong> ${img.image_id}</p>
                  <p><strong>Comprado em:</strong> ${new Date(img.data_compra).toLocaleDateString('pt-BR')}</p>
                  <a href="${img.link}" target="_blank">Ver Imagem</a>
                </div>
              `;
            });
          }
        })
        .catch(() => {
          lista.innerHTML = '<p style="color:red;font-size:0.9rem">Erro ao carregar imagens.</p>';
        });
    });

    var latitude = -14.806849833333334;
    var longitude = -39.28486733333333;
    var delta = 1.00;

    var map = L.map('map').setView([latitude, longitude], 13);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    L.marker([latitude, longitude]).addTo(map)
      .bindPopup('Ponto inicial')
      .openPopup();

    map.on('click', function(e) {
      const latClicked = e.latlng.lat;
      const lngClicked = e.latlng.lng;
      const latMin = latClicked - delta;
      const latMax = latClicked + delta;
      const lngMin = lngClicked - delta;
      const lngMax = lngClicked + delta;

      fetch(`/imagens-por-area?latMin=${latMin}&latMax=${latMax}&lngMin=${lngMin}&lngMax=${lngMax}`)
        .then(response => {
          if (!response.ok) return response.json().then(error => { throw new Error(error.message); });
          return response.json();
        })
        .then(data => {
          const resultadoDiv = document.getElementById("resultados");
          const painel = document.getElementById("painel-resultados");
          resultadoDiv.innerHTML = "";

          if (data.length === 0) {
            resultadoDiv.innerHTML = "<p style='color:#999;font-size:0.9rem'>Nenhuma imagem encontrada nessa área.</p>";
          } else {
            data.forEach(imagem => {
              resultadoDiv.innerHTML += `
                <div class="card-imagem">
                  <p><strong>ID:</strong> ${imagem.id}</p>
                  <p><strong>Lat:</strong> ${imagem.location_lat} | <strong>Lon:</strong> ${imagem.location_lon}</p>
                  <p><strong>Carteira:</strong> ${imagem.AndresWallet}</p>
                  <button onclick="window.location.href='Sellorbuy.html?wallet=${imagem.AndresWallet}&image_id=${imagem.id}&link=${imagem.link}'">Comprar</button>
                </div>
              `;
            });
          }
          painel.classList.add('open');
        })
        .catch(error => {
          console.error("Erro ao buscar imagens por área:", error);
          alert("Erro ao buscar imagens: " + error.message);
        });

      L.popup()
        .setLatLng(e.latlng)
        .setContent("Coordenadas: " + latClicked.toFixed(5) + ", " + lngClicked.toFixed(5))
        .openOn(map);
    });
  </script>

</body>
</html>
