<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Login - BlockChain</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #6a11cb, #2575fc, #ff416c);
      background-size: 600% 600%;
      animation: gradientShift 15s ease infinite;
      color: #fff;
      text-align: center;
      padding: 20px;
    }

    @keyframes gradientShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    h1 {
      font-size: 2rem;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 40px;
      text-shadow: 2px 2px 10px rgba(0,0,0,0.4);
    }

    .form-box {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 40px 50px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      width: 100%;
      max-width: 400px;
    }

    label {
      font-size: 0.95rem;
      font-weight: 600;
      align-self: flex-start;
      margin-bottom: -10px;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 12px 20px;
      border-radius: 15px;
      border: none;
      font-size: 1rem;
      outline: none;
      background: rgba(255,255,255,0.9);
      color: #333;
    }

    button {
      background: linear-gradient(135deg, #ff416c, #6a11cb);
      border: none;
      border-radius: 25px;
      color: #fff;
      font-size: 1.1rem;
      font-weight: bold;
      padding: 14px 40px;
      margin-top: 10px;
      cursor: pointer;
      transition: all 0.4s ease;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
      width: 100%;
    }

    button:hover {
      transform: scale(1.05) translateY(-2px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
      background: linear-gradient(135deg, #6a11cb, #ff416c);
    }

    button:active {
      transform: scale(0.97);
    }

    @media (max-width: 500px) {
      h1 { font-size: 1.5rem; }
      .form-box { padding: 30px 25px; }
    }
  </style>
</head>
<body>

  <h1>Acesse sua conta</h1>

  <div class="form-box">
    <label for="email">Email</label>
    <input type="email" id="email" placeholder="seu@email.com" />

    <label for="senha">Senha</label>
    <input type="password" id="senha" placeholder="••••••••" />

    <button id="btnLogin">Entrar</button>
  </div>

  <script>
    document.getElementById('btnLogin').addEventListener('click', () => {
      const email = document.getElementById('email').value;
      const senha = document.getElementById('senha').value;

      console.log('', email, senha);  

      if (!email || !senha) {
        alert('Preencha todos os campos!');
        return;
      }

      fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password: senha })
      })
      .then(res => res.json())
      .then(data => {
        if (data.sucesso) {
          window.location.href = 'mapa.html';
        } else {
          alert(data.mensagem || 'Email ou senha inválidos');
        }
      })
      .catch(err => console.error('Erro:', err));
    });
  </script>

</body>
</html>
